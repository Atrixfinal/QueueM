version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: queuem
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    environment:
      PORT: 4000
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/queuem
      JWT_SECRET: queuem-jwt-secret-change-in-production
      BCRYPT_SALT_ROUNDS: "10"
    depends_on:
      - db
    ports:
      - "4000:4000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  db-data:
